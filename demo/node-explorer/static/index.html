<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Node Explorer — Roots Demo</title>
  <link rel="stylesheet" href="/common/styles.css">
  <style>
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    header { flex-shrink: 0; }

    .explorer-layout {
      flex: 1;
      display: grid;
      grid-template-columns: 30% 35% 35%;
      grid-template-rows: 1fr auto;
      gap: 0;
      overflow: hidden;
    }

    /* Panels */
    .panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }
    .panel:last-of-type { border-right: none; }
    .panel-header {
      padding: 0.6rem 1rem;
      font-weight: 600;
      font-size: 0.85rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
    }
    .panel-body::-webkit-scrollbar { width: 5px; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--gray); border-radius: 3px; }

    /* Bottom bar */
    .bottom-bar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 1rem;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    .bottom-bar .label {
      font-size: 0.75rem;
      color: var(--gray);
      font-weight: 600;
      text-transform: uppercase;
    }
    .bottom-bar button {
      font-size: 0.75rem;
      padding: 0.3rem 0.7rem;
    }

    /* Node list */
    .node-list-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.6rem;
      border-radius: var(--radius);
      font-size: 0.8rem;
      cursor: default;
      transition: background 0.15s;
    }
    .node-list-item.current {
      background: rgba(79,159,245,0.15);
      border-left: 3px solid var(--blue);
    }
    .node-list-item.node-done {
      opacity: 0.6;
    }
    .node-type-badge {
      display: inline-block;
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      font-size: 0.65rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      min-width: 50px;
      text-align: center;
      background: var(--accent);
      color: var(--text);
    }
    .node-label {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .node-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Graph container */
    #graph-container {
      flex: 1;
      overflow: auto;
      padding: 0.5rem;
    }

    /* Tutorial panel */
    .tutorial-section {
      margin-bottom: 1rem;
    }
    .tutorial-section h3 {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--gray);
      text-transform: uppercase;
      margin-bottom: 0.4rem;
      letter-spacing: 0.03em;
    }
    .tutorial-section p {
      font-size: 0.85rem;
      line-height: 1.5;
      color: var(--text);
    }
    .tutorial-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .tutorial-header .icon {
      font-size: 1.5rem;
      line-height: 1;
    }
    .tutorial-header .title {
      font-size: 1.1rem;
      font-weight: 700;
    }

    /* YAML syntax highlighting */
    .yaml-block {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.8rem;
      line-height: 1.6;
      overflow-x: auto;
      white-space: pre;
    }
    .yaml-key { color: #67d4e4; }
    .yaml-string { color: #4ecca3; }
    .yaml-number { color: #4a9ff5; }
    .yaml-comment { color: #555; font-style: italic; }
    .yaml-bool { color: #f1c40f; }

    /* JSON output block */
    .json-block {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.8rem;
      line-height: 1.5;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
      max-height: 200px;
      overflow-y: auto;
    }

    /* Copyable snippet */
    .snippet-wrapper {
      position: relative;
    }
    .copy-btn {
      position: absolute;
      top: 0.4rem;
      right: 0.4rem;
      font-size: 0.65rem;
      padding: 0.2rem 0.5rem;
      background: var(--accent);
      color: var(--text);
      border-radius: 4px;
      opacity: 0.7;
      transition: opacity 0.15s;
    }
    .copy-btn:hover { opacity: 1; }

    /* Retry section */
    .retry-timeline {
      border-left: 2px solid var(--gray);
      padding-left: 0.75rem;
      margin-left: 0.25rem;
    }
    .retry-attempt {
      position: relative;
      padding: 0.3rem 0;
      font-size: 0.8rem;
    }
    .retry-attempt::before {
      content: '';
      position: absolute;
      left: -0.95rem;
      top: 0.55rem;
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .retry-attempt.attempt-failed::before { background: var(--red); }
    .retry-attempt.attempt-success::before { background: var(--green); }

    /* Placeholder */
    .tutorial-placeholder {
      color: var(--gray);
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.85rem;
    }

    /* Smooth transitions */
    .tutorial-content {
      animation: fadeIn 0.3s ease-out;
    }

    /* Waiting indicator */
    .waiting-indicator {
      font-size: 0.75rem;
      color: var(--gray);
      font-style: italic;
    }
  </style>
</head>
<body>
  <header>
    <h1>Node Explorer</h1>
    <span class="status-badge pending" id="run-status">no run</span>
  </header>

  <div class="explorer-layout">
    <!-- Left: Process Graph -->
    <div class="panel">
      <div class="panel-header">Process Graph</div>
      <div id="graph-container" class="panel-body"></div>
    </div>

    <!-- Center: Node List + Controls -->
    <div class="panel" style="border-left: 1px solid var(--border);">
      <div class="panel-header">
        <span>Execution</span>
        <span id="step-counter" class="text-gray" style="font-size:0.75rem;"></span>
      </div>
      <div class="panel-body" style="padding: 0.75rem;">
        <div id="node-list"></div>
      </div>
    </div>

    <!-- Right: Tutorial Panel -->
    <div class="panel">
      <div class="panel-header">Tutorial</div>
      <div class="panel-body" style="padding: 0.75rem;">
        <div id="tutorial-panel">
          <div class="tutorial-placeholder">
            Click <strong>Reset</strong> to create a run, then <strong>Step</strong> to walk through each node type.
          </div>
        </div>
      </div>
    </div>

    <!-- Bottom bar: Controls -->
    <div class="bottom-bar">
      <button class="btn-success" id="reset-btn" onclick="doReset()">Reset</button>
      <button class="btn-primary" id="step-btn" onclick="doStep()" disabled>Step</button>
      <button class="btn-outline" id="auto-btn" onclick="toggleAuto()">Auto-play</button>
      <span id="auto-status" class="waiting-indicator"></span>
      <span style="flex:1"></span>
      <span class="label" id="current-node-label"></span>
    </div>
  </div>

  <script src="/common/graph-renderer.js"></script>
  <script src="/common/state-viewer.js"></script>
  <script>
    /* ── State ── */
    let runId = null;
    let currentNodeId = null;
    let currentNodeType = null;
    let graphData = null;
    let tutorialCache = {};
    let autoPlayInterval = null;
    let stepCount = 0;
    let previousWorkItemState = null;

    const NODE_ICONS = {
      checkpoint: '\u2713',
      agent: '\u2699',
      agent_pool: '\u2699\u2699',
      decision: '\u25C6',
      fork: '\u2442',
      join: '\u2443',
      emit: '\u26A1',
      end: '\u25A0',
    };

    const graphRenderer = new GraphRenderer(document.getElementById('graph-container'));

    /* ── Reset ── */
    async function doReset() {
      const resp = await fetch('/api/reset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ process_id: 'node-explorer' }),
      });
      const data = await resp.json();
      runId = data.run_id;
      currentNodeId = null;
      currentNodeType = null;
      stepCount = 0;
      previousWorkItemState = null;
      tutorialCache = {};

      document.getElementById('step-btn').disabled = false;
      updateStatusBadge('running');
      document.getElementById('step-counter').textContent = '';
      document.getElementById('current-node-label').textContent = '';

      // Load initial graph
      const graphResp = await fetch('/api/runs/' + encodeURIComponent(runId) + '/graph');
      graphData = await graphResp.json();
      graphRenderer.render(graphData);
      renderNodeList(graphData);
      showTutorialPlaceholder('Click <strong>Step</strong> to begin the tour.');
    }

    /* ── Step ── */
    async function doStep() {
      if (!runId) return;

      const btn = document.getElementById('step-btn');
      btn.disabled = true;
      btn.textContent = '...';

      try {
        const resp = await fetch('/api/step', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ run_id: runId }),
        });

        if (!resp.ok) {
          const err = await resp.json();
          console.error('Step failed:', err);
          btn.disabled = false;
          btn.textContent = 'Step';
          return;
        }

        const data = await resp.json();
        graphData = data.graph;
        stepCount++;

        // Update graph
        graphRenderer.update(graphData);
        renderNodeList(graphData);

        // Update status
        const runStatus = graphData.run_status;
        updateStatusBadge(runStatus);
        document.getElementById('step-counter').textContent = 'Step ' + stepCount;

        // Find current node
        const prevNodeId = currentNodeId;
        const currentNode = findCurrentNode(graphData);

        if (currentNode && currentNode.id !== prevNodeId) {
          currentNodeId = currentNode.id;
          currentNodeType = currentNode.type;
          document.getElementById('current-node-label').textContent = currentNode.label + ' (' + currentNode.type + ')';
          await loadTutorial(currentNode);
        } else if (currentNode) {
          // Same node, but may have new output — update "What happened"
          await updateWhatHappened(currentNode);
        }

        // Check if run is done
        if (runStatus === 'completed' || runStatus === 'failed') {
          btn.disabled = true;
          btn.textContent = 'Done';
          stopAutoPlay();

          // Final update of tutorial with output
          if (currentNode) {
            await updateWhatHappened(currentNode);
          }
          return;
        }
      } catch (err) {
        console.error('Step error:', err);
      }

      btn.disabled = false;
      btn.textContent = 'Step';
    }

    /* ── Find current node ── */
    function findCurrentNode(graph) {
      const nodes = graph.nodes || [];
      // Prefer running or paused
      let node = nodes.find(n => n.status === 'running' || n.status === 'paused');
      if (node) return node;

      // Otherwise find the most recently completed node that wasn't previously current
      const completed = nodes.filter(n => n.status === 'completed');
      if (completed.length > 0) return completed[completed.length - 1];
      return null;
    }

    /* ── Load tutorial content ── */
    async function loadTutorial(node) {
      const nodeType = node.type;
      const panel = document.getElementById('tutorial-panel');

      // Also check if this node has retry config — load retry tutorial too
      const hasRetry = nodeHasRetry(node.id);
      const typesToLoad = [nodeType];
      if (hasRetry) typesToLoad.push('retry');

      // Fetch tutorial content
      for (const t of typesToLoad) {
        if (!tutorialCache[t]) {
          try {
            const resp = await fetch('/api/tutorial/' + encodeURIComponent(t));
            if (resp.ok) tutorialCache[t] = await resp.json();
          } catch { /* ignore */ }
        }
      }

      const content = tutorialCache[nodeType];
      if (!content) {
        panel.innerHTML = '<div class="tutorial-placeholder">No tutorial content for "' + escapeHtml(nodeType) + '"</div>';
        return;
      }

      const retryContent = hasRetry ? tutorialCache['retry'] : null;

      // Build tutorial HTML
      let html = '<div class="tutorial-content">';

      // Header
      const icon = NODE_ICONS[nodeType] || '\u25CB';
      html += '<div class="tutorial-header">';
      html += '<span class="icon">' + icon + '</span>';
      html += '<div>';
      html += '<div class="title">' + escapeHtml(content.title) + '</div>';
      html += '<div style="font-size:0.75rem;color:var(--gray)">Node: ' + escapeHtml(node.label) + ' (' + escapeHtml(node.id) + ')</div>';
      html += '</div></div>';

      // What this does
      html += '<div class="tutorial-section">';
      html += '<h3>What this does</h3>';
      html += '<p>' + escapeHtml(content.what) + '</p>';
      html += '</div>';

      // When to use it
      html += '<div class="tutorial-section">';
      html += '<h3>When to use it</h3>';
      html += '<p>' + escapeHtml(content.when) + '</p>';
      html += '</div>';

      // Configuration
      html += '<div class="tutorial-section">';
      html += '<h3>Configuration</h3>';
      html += '<div class="yaml-block">' + highlightYaml(content.config) + '</div>';
      html += '</div>';

      // What happened (placeholder — filled after execution)
      html += '<div class="tutorial-section" id="what-happened-section">';
      html += '<h3>What happened</h3>';
      html += '<div class="json-block" id="what-happened-output">';
      html += '<span class="waiting-indicator">Waiting for node to execute...</span>';
      html += '</div>';
      html += '</div>';

      // Retry section (if applicable)
      if (retryContent && hasRetry) {
        html += '<div class="tutorial-section" id="retry-section">';
        html += '<h3>Retry</h3>';
        html += '<p>' + escapeHtml(retryContent.what) + '</p>';
        html += '<div id="retry-timeline" class="retry-timeline" style="margin-top:0.5rem;">';
        html += '<div class="waiting-indicator">Retry attempts will appear here...</div>';
        html += '</div>';
        html += '</div>';
      }

      // Try it yourself
      html += '<div class="tutorial-section">';
      html += '<h3>Try it yourself</h3>';
      html += '<div class="snippet-wrapper">';
      html += '<button class="copy-btn" onclick="copySnippet(this)">Copy</button>';
      html += '<div class="yaml-block" id="try-snippet">' + highlightYaml(buildTrySnippet(nodeType, content)) + '</div>';
      html += '</div>';
      html += '</div>';

      html += '</div>';
      panel.innerHTML = html;

      // Immediately check if output is already available
      await updateWhatHappened(node);
    }

    /* ── Update "What happened" section ── */
    async function updateWhatHappened(node) {
      const outputEl = document.getElementById('what-happened-output');
      if (!outputEl) return;

      try {
        const resp = await fetch('/api/runs/' + encodeURIComponent(runId));
        if (!resp.ok) return;
        const runData = await resp.json();
        const state = runData.work_item_state || {};

        // Find what output this node produced
        const outputData = extractNodeOutput(node, state);

        if (outputData !== null && outputData !== undefined) {
          outputEl.textContent = JSON.stringify(outputData, null, 2);
          outputEl.classList.add('fade-in');
        }

        previousWorkItemState = state;
      } catch { /* ignore */ }

      // Update retry timeline if applicable
      if (nodeHasRetry(node.id)) {
        await updateRetryTimeline(node);
      }
    }

    /* ── Extract node output from state ── */
    function extractNodeOutput(node, state) {
      // Map node IDs to their output keys based on process config
      const OUTPUT_MAP = {
        'classify': 'classify_output',
        'validate': 'validation_output',
        'quality_gate': '_decision',
        'analyze_content': 'content_analysis',
        'analyze_metadata': 'metadata_analysis',
      };

      const key = OUTPUT_MAP[node.id];
      if (key && state[key] !== undefined) return state[key];

      // For decision nodes, show which edge was taken
      if (node.type === 'decision' && graphData) {
        const takenEdges = (graphData.edges || []).filter(
          e => e.from === node.id && e.status === 'traversed'
        );
        if (takenEdges.length > 0) {
          return { decision: takenEdges[0].label || takenEdges[0].to, edge: takenEdges[0].to };
        }
      }

      // For emit nodes, show what event was fired
      if (node.type === 'emit') {
        const payload = {};
        const payloadKeys = ['content_analysis', 'metadata_analysis'];
        for (const k of payloadKeys) {
          if (state[k] !== undefined) payload[k] = state[k];
        }
        if (Object.keys(payload).length > 0) {
          return { event_type: 'tour.analysis_complete', payload };
        }
      }

      // For fork/join/checkpoint/end, show node status
      if (node.status === 'completed' || node.status === 'failed') {
        return { status: node.status, node_id: node.id, type: node.type };
      }
      if (node.status === 'paused') {
        return { status: 'paused', message: 'Waiting for checkpoint resolution' };
      }

      return null;
    }

    /* ── Update retry timeline ── */
    async function updateRetryTimeline(node) {
      const container = document.getElementById('retry-timeline');
      if (!container) return;

      try {
        const resp = await fetch('/api/runs/' + encodeURIComponent(runId) + '/history');
        if (!resp.ok) return;
        const events = await resp.json();

        // Filter events for this node
        const nodeEvents = events.filter(e => e.node_id === node.id);
        if (nodeEvents.length === 0) return;

        const failedAttempts = nodeEvents.filter(e => e.event_type === 'failed');
        const successAttempt = nodeEvents.find(e => e.event_type === 'completed');

        if (failedAttempts.length === 0 && !successAttempt) return;

        let html = '';
        let attemptNum = 1;

        for (const fail of failedAttempts) {
          html += '<div class="retry-attempt attempt-failed">';
          html += '<strong>Attempt ' + attemptNum + ':</strong> ';
          html += '<span class="text-red">Failed</span> — Simulated transient failure';
          html += '</div>';
          attemptNum++;
        }

        if (successAttempt) {
          html += '<div class="retry-attempt attempt-success">';
          html += '<strong>Attempt ' + attemptNum + ':</strong> ';
          html += '<span class="text-green">Succeeded</span> — Node completed normally';
          html += '</div>';
        }

        container.innerHTML = html;
      } catch { /* ignore */ }
    }

    /* ── Check if node has retry config ── */
    function nodeHasRetry(nodeId) {
      // In our process, analyze_content has retry config
      return nodeId === 'analyze_content';
    }

    /* ── Render node list ── */
    function renderNodeList(graph) {
      const container = document.getElementById('node-list');
      const nodes = graph.nodes || [];
      let html = '';

      for (const node of nodes) {
        const isCurrent = node.status === 'running' || node.status === 'paused';
        const isDone = node.status === 'completed' || node.status === 'failed';
        const classes = ['node-list-item'];
        if (isCurrent) classes.push('current');
        if (isDone) classes.push('node-done');

        const dotColor = {
          pending: 'var(--gray)',
          running: 'var(--blue)',
          completed: 'var(--green)',
          failed: 'var(--red)',
          paused: 'var(--yellow)',
        }[node.status] || 'var(--gray)';

        html += '<div class="' + classes.join(' ') + '">';
        html += '<div class="node-status-dot" style="background:' + dotColor + '"></div>';
        html += '<span class="node-type-badge">' + escapeHtml(node.type) + '</span>';
        html += '<span class="node-label">' + escapeHtml(node.label) + '</span>';
        if (isCurrent) html += '<span class="text-blue" style="font-size:0.7rem;font-weight:600">\u25C0</span>';
        html += '</div>';
      }

      container.innerHTML = html;
    }

    /* ── Build "Try it yourself" snippet ── */
    function buildTrySnippet(nodeType, content) {
      const SNIPPETS = {
        checkpoint: '- id: my_checkpoint\n  type: checkpoint\n  label: Review Step\n  config:\n    prompt: "Please review before continuing."',
        agent: '- id: my_agent\n  type: agent\n  label: Process Data\n  config:\n    agent: my_agent_name\n    output_key: agent_result',
        agent_pool: '- id: my_pool\n  type: agent_pool\n  label: Validate All\n  config:\n    agents:\n      - validator_a\n      - validator_b\n    execution_mode: parallel\n    aggregation: merge_all\n    output_key: validation_result',
        decision: '- id: my_gate\n  type: decision\n  label: Quality Check\n  config:\n    mode: deterministic\n    edges:\n      - target: good_path\n        condition: "score >= 0.8"\n        label: Pass\n      - target: bad_path\n        condition: "score < 0.8"\n        label: Fail',
        fork: '- id: my_fork\n  type: fork\n  label: Split Work\n  config: {}\n\n# Add to process-level:\nfork_join_map:\n  my_fork: my_join',
        join: '- id: my_join\n  type: join\n  label: Combine\n  config:\n    merge_strategy: merge_all',
        emit: '- id: my_emit\n  type: emit\n  label: Notify\n  config:\n    event_type: "my.custom_event"\n    payload_keys:\n      - result_key',
        end: '- id: my_end\n  type: end\n  label: Finish\n  config:\n    status: completed',
      };
      return SNIPPETS[nodeType] || content.config;
    }

    /* ── YAML syntax highlighting ── */
    function highlightYaml(text) {
      return text.split('\n').map(line => {
        // Comments
        if (line.trim().startsWith('#')) {
          return '<span class="yaml-comment">' + escapeHtml(line) + '</span>';
        }

        // Key-value lines
        return line.replace(/^(\s*)([a-zA-Z_][\w-]*)(:)(.*)$/, (match, indent, key, colon, rest) => {
          const highlighted = escapeHtml(indent) +
            '<span class="yaml-key">' + escapeHtml(key) + '</span>' +
            colon +
            highlightYamlValue(rest);
          return highlighted;
        });
      }).join('\n');
    }

    function highlightYamlValue(val) {
      if (!val || val.trim() === '') return escapeHtml(val);
      const trimmed = val.trim();

      // Quoted strings
      if (/^".*"$/.test(trimmed) || /^'.*'$/.test(trimmed)) {
        return val.replace(trimmed, '<span class="yaml-string">' + escapeHtml(trimmed) + '</span>');
      }
      // Numbers
      if (/^\s*\d+(\.\d+)?\s*$/.test(val)) {
        return val.replace(trimmed, '<span class="yaml-number">' + escapeHtml(trimmed) + '</span>');
      }
      // Booleans
      if (/^\s*(true|false)\s*$/i.test(val)) {
        return val.replace(trimmed, '<span class="yaml-bool">' + escapeHtml(trimmed) + '</span>');
      }
      // List items (- value)
      if (trimmed.startsWith('- ')) {
        const listVal = trimmed.slice(2);
        return escapeHtml(val.slice(0, val.indexOf('-'))) + '- ' + highlightYamlValue(' ' + listVal);
      }

      return escapeHtml(val);
    }

    /* ── Copy snippet ── */
    function copySnippet(btn) {
      const block = btn.parentElement.querySelector('.yaml-block');
      const text = block.textContent;
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
      });
    }

    /* ── Auto-play ── */
    function toggleAuto() {
      if (autoPlayInterval) {
        stopAutoPlay();
      } else {
        startAutoPlay();
      }
    }

    function startAutoPlay() {
      if (!runId) return;
      document.getElementById('auto-btn').textContent = 'Stop';
      document.getElementById('auto-status').textContent = 'Auto-stepping...';
      autoPlayInterval = setInterval(async () => {
        const btn = document.getElementById('step-btn');
        if (btn.disabled && btn.textContent === 'Done') {
          stopAutoPlay();
          return;
        }
        if (!btn.disabled) {
          await doStep();
        }
      }, 1500);
    }

    function stopAutoPlay() {
      if (autoPlayInterval) {
        clearInterval(autoPlayInterval);
        autoPlayInterval = null;
      }
      document.getElementById('auto-btn').textContent = 'Auto-play';
      document.getElementById('auto-status').textContent = '';
    }

    /* ── Status badge ── */
    function updateStatusBadge(status) {
      const badge = document.getElementById('run-status');
      badge.textContent = status || 'unknown';
      badge.className = 'status-badge ' + (status || 'pending');
    }

    /* ── Tutorial placeholder ── */
    function showTutorialPlaceholder(msg) {
      document.getElementById('tutorial-panel').innerHTML =
        '<div class="tutorial-placeholder">' + msg + '</div>';
    }

    /* ── Util ── */
    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }
  </script>
</body>
</html>
